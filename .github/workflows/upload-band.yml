name: Auto Generate & Upload to Naver Band

# ===========================================================
# 완전 자동화: 매일 정해진 시간에 카드뉴스를 생성하고
# 검수 없이 곳바로 네이버 밴드에 게시 (Playwright 브라저 자동화)
#
# 지연/누락 대비: 각 슬롯마다 +4시간 보충(catch-up) 실행을 둔다.
# 중복 방지: 게시 성공 시 state/<날짜>_<슬롯>.done 표시 파일을 커밋.
#         보충 실행은 표시가 있으면 건너뛰고, 없을 때만 올린다.
# ===========================================================

on:
  schedule:
    # AM 기본 — 한국 08:30 (UTC 23:30, 전날)
    - cron: '30 23 * * *'
    # AM 보충 +4h — 한국 12:30 (UTC 03:30)
    - cron: '30 3 * * *'
    # PM 기본 — 한국 18:00 (UTC 09:00)
    - cron: '0 9 * * *'
    # PM 보충 +4h — 한국 22:00 (UTC 13:00)
    - cron: '0 13 * * *'

  workflow_dispatch:
    inputs:
      slot:
        description: '슬롯'
        required: true
        default: 'AM'
        type: choice
        options:
          - AM
          - PM
      topic:
        description: '세부 주제 (비워두면 날짜별 자동 순환)'
        required: false
        default: ''
      dry_run:
        description: 'dry-run (생성만, 실제 게시 안 함)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# state/ 표시 파일을 main 에 커밋하기 위해 쓰기 권한 필요
permissions:
  contents: write

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve run parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "slot=${{ github.event.inputs.slot }}" >> $GITHUB_OUTPUT
            echo "topic=${{ github.event.inputs.topic }}" >> $GITHUB_OUTPUT
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> $GITHUB_OUTPUT
          else
            # 스케줄: UTC 시각으로 슬롯 판별 (23/03 → AM, 09/13 → PM)
            HOUR_UTC=$(date -u +%H)
            case "$HOUR_UTC" in
              23|03) echo "slot=AM" >> $GITHUB_OUTPUT ;;
              09|13) echo "slot=PM" >> $GITHUB_OUTPUT ;;
              *)     echo "slot=AM" >> $GITHUB_OUTPUT ;;
            esac
            echo "topic=" >> $GITHUB_OUTPUT
            echo "dry_run=false" >> $GITHUB_OUTPUT
          fi
          # KST 기준 오늘 날짜 (기본/보충 실행이 같은 날짜를 공유 → 표시 파일 공유)
          echo "date=$(TZ=Asia/Seoul date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Check if already posted (schedule only)
        id: skip
        run: |
          SKIP=false
          FLAG="state/${{ steps.params.outputs.date }}_${{ steps.params.outputs.slot }}.done"
          if [ "${{ github.event_name }}" = "schedule" ] && [ -f "$FLAG" ]; then
            SKIP=true
            echo "✓ 이미 게시 완료: ${{ steps.params.outputs.date }} ${{ steps.params.outputs.slot }} → 건너뜀"
          else
            echo "→ 게시 필요: ${{ steps.params.outputs.date }} ${{ steps.params.outputs.slot }}"
          fi
          echo "skip=$SKIP" >> $GITHUB_OUTPUT

      - name: Set up Python
        if: steps.skip.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        if: steps.skip.outputs.skip != 'true'
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Generate today's card set
        if: steps.skip.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAND_NAME: ${{ secrets.BRAND_NAME }}
        run: |
          ARGS="--date ${{ steps.params.outputs.date }} --slot ${{ steps.params.outputs.slot }}"
          if [ -n "${{ steps.params.outputs.topic }}" ]; then
            ARGS="$ARGS --topic \"${{ steps.params.outputs.topic }}\""
          fi
          eval python generate.py $ARGS

      - name: Restore Band login session
        if: steps.skip.outputs.skip != 'true'
        env:
          BAND_STORAGE_STATE_JSON: ${{ secrets.BAND_STORAGE_STATE_JSON }}
        run: |
          if [ -z "$BAND_STORAGE_STATE_JSON" ]; then
            echo "::error::secrets.BAND_STORAGE_STATE_JSON not set"
            exit 1
          fi
          printf '%s' "$BAND_STORAGE_STATE_JSON" > band_storage_state.json

      - name: Upload to Band (no approval gate)
        if: steps.skip.outputs.skip != 'true'
        env:
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
          BAND_ID: ${{ secrets.BAND_ID }}
          BAND_STORAGE_STATE: ./band_storage_state.json
        run: |
          ARGS="--slot ${{ steps.params.outputs.slot }} --date ${{ steps.params.outputs.date }} --allow-draft"
          if [ "${{ steps.params.outputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python band_scheduler.py $ARGS

      - name: Mark slot as posted
        if: ${{ success() && steps.skip.outputs.skip != 'true' && steps.params.outputs.dry_run != 'true' }}
        run: |
          DATE="${{ steps.params.outputs.date }}"
          SLOT="${{ steps.params.outputs.slot }}"
          mkdir -p state
          printf '{"date":"%s","slot":"%s","posted_at":"%s"}\n' \
            "$DATE" "$SLOT" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "state/${DATE}_${SLOT}.done"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "state/${DATE}_${SLOT}.done"
          git commit -m "chore: mark ${DATE} ${SLOT} posted [skip ci]" || echo "nothing to commit"
          git push origin HEAD:main

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: band-upload-logs-${{ steps.params.outputs.slot }}-${{ github.run_id }}
          path: |
            logs/band/*.json
          if-no-files-found: ignore
          retention-days: 30
