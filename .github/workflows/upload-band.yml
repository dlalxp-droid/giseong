name: Auto Generate & Upload to Naver Band

# ===========================================================
# 완전 자동화: 매일 정해진 시간에 카드뉴스를 생성하고
# 검수 없이 곳바로 네이버 밴드에 게시 (Playwright 브라저 자동화)
#
# ⚠ 검수 게이트 없음: 생성된 내용이 사람 확인 없이 바로 발행됨
# ===========================================================

on:
  schedule:
    # 한국시간 08:30 = UTC 23:30 (전날) → AM 슬롯
    - cron: '30 23 * * *'
    # 한국시간 18:00 = UTC 09:00 → PM 슬롯
    - cron: '0 9 * * *'

  workflow_dispatch:
    inputs:
      slot:
        description: '슬롯'
        required: true
        default: 'AM'
        type: choice
        options:
          - AM
          - PM
      topic:
        description: '세부 주제 (비워두면 자동 회전)'
        required: false
        default: ''
      dry_run:
        description: 'dry-run (생성만, 실제 게시 안 함)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Resolve run parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "slot=${{ github.event.inputs.slot }}" >> $GITHUB_OUTPUT
            echo "topic=${{ github.event.inputs.topic }}" >> $GITHUB_OUTPUT
            echo "dry_run=${{ github.event.inputs.dry_run }}" >> $GITHUB_OUTPUT
          else
            HOUR_UTC=$(date -u +%H)
            if [ "$HOUR_UTC" = "23" ]; then
              echo "slot=AM" >> $GITHUB_OUTPUT
            else
              echo "slot=PM" >> $GITHUB_OUTPUT
            fi
            echo "topic=" >> $GITHUB_OUTPUT
            echo "dry_run=false" >> $GITHUB_OUTPUT
          fi
          # KST 기준 오늘 날짜 (UTC+9)
          echo "date=$(TZ=Asia/Seoul date +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Generate today's card set
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAND_NAME: ${{ secrets.BRAND_NAME }}
        run: |
          ARGS="--date ${{ steps.params.outputs.date }} --slot ${{ steps.params.outputs.slot }}"
          if [ -n "${{ steps.params.outputs.topic }}" ]; then
            ARGS="$ARGS --topic \"${{ steps.params.outputs.topic }}\""
          fi
          eval python generate.py $ARGS

      - name: Restore Band login session
        env:
          BAND_STORAGE_STATE_JSON: ${{ secrets.BAND_STORAGE_STATE_JSON }}
        run: |
          if [ -z "$BAND_STORAGE_STATE_JSON" ]; then
            echo "::error::secrets.BAND_STORAGE_STATE_JSON not set (README 5-1 참고)"
            exit 1
          fi
          printf '%s' "$BAND_STORAGE_STATE_JSON" > band_storage_state.json

      - name: Upload to Band (no approval gate)
        env:
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
          BAND_ID: ${{ secrets.BAND_ID }}
          BAND_STORAGE_STATE: ./band_storage_state.json
        run: |
          # --allow-draft: 검수 없이 draft 그대로 게시 (완전 자동화)
          ARGS="--slot ${{ steps.params.outputs.slot }} --date ${{ steps.params.outputs.date }} --allow-draft"
          if [ "${{ steps.params.outputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python band_scheduler.py $ARGS

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: band-upload-logs-${{ steps.params.outputs.slot }}
          path: |
            logs/band/*.json
          if-no-files-found: ignore
          retention-days: 30
