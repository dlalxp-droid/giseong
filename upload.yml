name: Generate Weekly Cards

# ===========================================================
# 매주 월요일 한국시간 새벽에 14세트 자동 생성
# 결과물은 PR로 만들어져서 본인이 검수 후 머지 → approved/ 이동
# ===========================================================

on:
  schedule:
    # 매주 일요일 한국시간 21:00 = UTC 12:00 (월요일 오전 분량 미리 준비)
    - cron: '0 12 * * 0'

  # 수동 실행 (대부분 이걸로 사용)
  workflow_dispatch:
    inputs:
      days:
        description: '며칠치 생성 (1-14)'
        required: true
        default: '7'
        type: string
      start_date:
        description: '시작 날짜 (YYYY-MM-DD, 비워두면 내일부터)'
        required: false
        default: ''
      slots:
        description: '슬롯 (AM, PM, 또는 AM,PM)'
        required: true
        default: 'AM,PM'
        type: choice
        options:
          - 'AM,PM'
          - 'AM'
          - 'PM'
      topic:
        description: '특정 주제 (비워두면 자동 회전)'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      - name: Determine generation arguments
        id: args
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            DAYS="${{ github.event.inputs.days }}"
            SLOTS="${{ github.event.inputs.slots }}"
            START_DATE="${{ github.event.inputs.start_date }}"
            TOPIC="${{ github.event.inputs.topic }}"
          else
            # 정기 실행 (일요일 → 다음 주 7일치)
            DAYS="7"
            SLOTS="AM,PM"
            START_DATE="$(date -d 'tomorrow' +%Y-%m-%d)"
            TOPIC=""
          fi

          ARGS="--days $DAYS --slots $SLOTS"
          if [ -n "$START_DATE" ]; then
            ARGS="$ARGS --start-date $START_DATE"
          fi
          if [ -n "$TOPIC" ]; then
            ARGS="$ARGS --topic \"$TOPIC\""
          fi

          echo "args=$ARGS" >> $GITHUB_OUTPUT
          echo "branch_name=auto/cards-$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

      - name: Generate card sets
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAND_NAME: ${{ secrets.BRAND_NAME }}
        run: |
          python generate.py ${{ steps.args.outputs.args }}

      - name: Create pull request for review
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.args.outputs.branch_name }}
          base: main
          commit-message: "🤖 자동 생성: 카드뉴스 ${{ steps.args.outputs.args }}"
          title: "📋 [검수 요청] 카드뉴스 ${{ github.event_name == 'schedule' && '주간 자동 생성' || '수동 생성' }}"
          body: |
            ## 검수 체크리스트

            아래 항목 확인 후 머지(또는 직접 approved 폴더로 이동):

            - [ ] 콘텐츠가 보상/약관/의료자문 주제 아닌지
            - [ ] 8장 모두 글자 잘리지 않았는지
            - [ ] 강조 단어(골드) 적절한지
            - [ ] Before/After 멘트가 자연스러운지
            - [ ] 캡션 + 해시태그 점검

            ## 생성 정보

            - 명령어: `python generate.py ${{ steps.args.outputs.args }}`
            - 실행 시각: ${{ github.event.head_commit.timestamp }}
            - 트리거: ${{ github.event_name }}

            ## 운영 절차

            1. 이 PR의 `output/날짜/슬롯/draft/` 안의 카드 8장을 본다
            2. `captions/날짜_슬롯.txt` 캡션을 본다
            3. **수정 필요 시**: 로컬에서 `_meta.json`을 편집하고 `python scripts/renderer.py --card-json _meta.json --out-dir <경로>` 로 재렌더
            4. **OK면**: `draft/` → `approved/` 이동하는 커밋 추가 후 머지
            5. 머지되면 정해진 시간에 자동 업로드 워크플로우가 발동
          labels: |
            cardnews
            review-needed
          delete-branch: true
