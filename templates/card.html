<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>{{TITLE}}</title>
<style>
  :root {
    --navy:  #0A1628;
    --cream: #F5F1E8;
    --gold:  #C8A14B;
    --red:   #B8321A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 1080px;
    height: 1080px;
    font-family: 'Pretendard', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    background: var(--cream);
  }

  .card {
    position: relative;
    width: 1080px;
    height: 1080px;
    padding: 80px;
    overflow: hidden;
  }

  /* ===== 카드 타입별 배경 ===== */
  .card.cover    { background: var(--navy);  color: var(--cream); }
  .card.intro    { background: var(--cream); color: var(--navy); }
  .card.point    { background: var(--cream); color: var(--navy); }
  .card.tip      { background: var(--navy);  color: var(--cream); }
  .card.summary  { background: var(--navy);  color: var(--cream); }
  .card.cta      { background: var(--cream); color: var(--navy); }

  /* ===== 상단 라벨 ===== */
  .top-label {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 12px 28px;
    border: 2px solid currentColor;
    border-radius: 999px;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.04em;
    margin-bottom: 56px;
  }

  /* ===== 메인 카피 영역 ===== */
  .main {
    position: absolute;
    top: 220px;
    left: 80px;
    right: 80px;
    bottom: 280px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }

  .headline {
    font-size: 78px;
    font-weight: 800;
    line-height: 1.2;
    letter-spacing: -0.02em;
    margin-bottom: 32px;
    word-break: keep-all;
  }

  .headline .accent { color: var(--red); }

  .card.cover .headline .accent,
  .card.tip .headline .accent,
  .card.summary .headline .accent { color: var(--gold); }

  .subhead {
    font-size: 36px;
    font-weight: 500;
    line-height: 1.55;
    opacity: 0.9;
    word-break: keep-all;
  }

  /* ===== point 카드 숫자 배지 ===== */
  .point-num {
    font-size: 96px;
    font-weight: 800;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 28px;
  }

  .body {
    font-size: 40px;
    font-weight: 500;
    line-height: 1.55;
    opacity: 0.9;
    word-break: keep-all;
  }

  /* ===== tip 강조 박스 ===== */
  .tip-box {
    padding: 40px 44px;
    border-radius: 18px;
    margin-top: 16px;
    background: rgba(200, 161, 75, 0.16);
    border-left: 8px solid var(--gold);
    font-size: 40px;
    line-height: 1.55;
    font-weight: 500;
    word-break: keep-all;
  }

  /* ===== 하단 고정 영역 ===== */
  .bottom-stack {
    position: absolute;
    bottom: 74px;
    left: 80px;
    right: 80px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .page-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.06em;
  }

  .page-indicator .current { color: var(--gold); font-size: 28px; }
  .page-indicator .total   { opacity: 0.6; }

  .signoff {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .signoff .brand {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .signoff .swipe {
    font-size: 22px;
    font-weight: 500;
    opacity: 0.7;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ===== 장식 요소 ===== */
  .decor-line {
    position: absolute;
    top: 80px;
    right: 80px;
    width: 80px;
    height: 4px;
    background: var(--gold);
  }

  .corner-quote {
    position: absolute;
    top: 200px;
    right: 80px;
    font-size: 180px;
    line-height: 1;
    font-family: Georgia, serif;
    color: var(--gold);
    opacity: 0.18;
    font-weight: 700;
  }
</style>
</head>
<body>
  <div class="card {{CARD_TYPE}}">
    <div class="decor-line"></div>

    {{TOP_LABEL_BLOCK}}
    {{CORNER_QUOTE_BLOCK}}

    <div class="main">
      {{MAIN_CONTENT}}
    </div>

    <div class="bottom-stack">
      <div class="page-indicator">
        <span class="current">{{PAGE_NUM}}</span>
        <span class="total">/ {{TOTAL_PAGES}}</span>
      </div>
      <div class="signoff">
        <span class="brand">{{BRAND}}</span>
        <span class="swipe">{{SWIPE_TEXT}}</span>
      </div>
    </div>
  </div>
</body>
</html>
