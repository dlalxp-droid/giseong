# ============================================
# 정보형 카드뉴스 자동화 시스템 설정
# ============================================

# ----- 디자인 -----
design:
  width: 1080
  height: 1080
  cards_per_set: 8
  colors:
    navy:  "#0A1628"
    cream: "#F5F1E8"
    gold:  "#C8A14B"
    red:   "#B8321A"

# ----- 콘텐츠 (정보형, 4주제 순환) -----
content:
  # 날짜별로 순환하는 4개 대주제 (generate.py THEME_POOL 와 동일)
  theme_pool:
    - "보험 정보"
    - "건강 정보"
    - "생활 정보"
    - "금융 정보"
  target: "일반 밴드 구독자 (보험·생활 정보에 관심 있는 일반인)"
  tone: "쉽고 유익하게, 과장·단정 없이 검증된 일반 정보 중심"
  # 가짜뉴스 방지 가드레일 (시스템 프롬프트에도 반영됨)
  guardrails:
    - "실시간 뉴스/속보 금지 ('이번주', 특정 날짜, 최신 사건 단정 X)"
    - "특정 회사·상품·금융 종목·병원·약품 이름 언급 금지"
    - "의료 진단/처방, 투자 권유, 법률 단정 금지"
    - "검증되지 않은 통계·수치 날조 금지"
  structure:
    - "표지 (후킹)"
    - "왜 중요한지"
    - "핵심 정보 3가지"
    - "실전 팁"
    - "한 줄 요약"
    - "저장·공유 유도"

# ----- 사인오프 -----
branding:
  sign_off: "@bobobun"   # 본인 브랜드명 (BRAND_NAME 환경변수가 있으면 그걸 우선)
  swipe_cta: "다음 ➜"

# ----- 슬롯 (자동 업로드 시간) -----
slots:
  AM: "08:30"
  PM: "18:00"

# ----- LLM (콘텐츠 생성) -----
llm:
  provider: "anthropic"
  model: "claude-sonnet-4-6"   # 최신 Sonnet (API 유효 모델 ID)
  max_tokens: 4000
  temperature: 0.7

# ----- Playwright 렌더링 -----
render:
  scale: 1
  format: "png"
  wait_for: "networkidle"
  timeout_ms: 30000

# ----- 출력 경로 -----
paths:
  template: "templates/card.html"
  output_root: "output"
  captions_root: "captions"
  input_root: "input"

# ----- 인스타 업로드 -----
instagram:
  api_version: "v21.0"
  carousel_size: 8
  retry_max: 3
  retry_delay_sec: 30

# ----- 네이버 밴드 업로드 (Playwright 전용) -----
band:
  retry_max: 3
  retry_delay_sec: 30
  web_selectors_override: {}

# ----- 실패 알림 (선택) -----
notify:
  enabled: false
  webhook_url: ""
